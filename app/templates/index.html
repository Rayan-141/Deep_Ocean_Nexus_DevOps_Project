<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepOcean Nexus Live Monitor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #070f1e; color: #e2e8f0; line-height: 1.5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #1e293b; margin-bottom: 30px; }
        h1 { font-size: 24px; font-weight: 700; color: #38bdf8; display: flex; align-items: center; gap: 10px; }
        .live-indicator { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #10b981; }
        .pulse { width: 10px; height: 10px; background: #10b981; border-radius: 50%; animation: pulse-anim 1.5s infinite; }
        @keyframes pulse-anim { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }
        .main-card { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 1px solid #334155; border-radius: 12px; padding: 24px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .cable-info h2 { font-size: 20px; color: #f1f5f9; margin-bottom: 4px; }
        .status-badge { padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; display: inline-block; }
        .status-healthy { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid #10b981; }
        .status-degraded { background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid #f59e0b; }
        .status-critical { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid #ef4444; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #0f172a; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; gap: 16px; transition: transform 0.2s ease, border-color 0.2s ease; }
        .card:hover { transform: translateY(-2px); border-color: #38bdf8; }
        .card-title { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; border-bottom: 1px solid #1e293b; padding-bottom: 8px; }
        .metric-row { display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .metric-label { color: #94a3b8; }
        .metric-value { font-weight: 600; color: #f1f5f9; }
        .highlight { color: #38bdf8; }
        .threat-low { color: #34d399; }
        .threat-medium { color: #fbbf24; }
        .threat-high { color: #f87171; }
        footer { text-align: center; color: #64748b; font-size: 12px; margin-top: 40px; padding: 20px 0; border-top: 1px solid #1e293b; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌊 DEEPOCEAN NEXUS</h1>
            <div class="live-indicator">
                <div class="pulse"></div>
                <span>LIVE TELEMETRY</span>
            </div>
        </header>

        <div id="status-panel"></div>
        <div id="metrics-grid" class="grid"></div>

        <footer>
            <p>DeepOcean Nexus - Subsea Communications Infrastructure Platform</p>
        </footer>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/cable-status');
                const data = await response.json();
                updateUI(data);
            } catch (error) {
                console.error(error);
            }
        }

        function getStatusClass(status) {
            if (status === 'HEALTHY') return 'status-healthy';
            if (status === 'DEGRADED') return 'status-degraded';
            return 'status-critical';
        }

        function getThreatClass(level) {
            if (level === 'LOW') return 'threat-low';
            if (level === 'MEDIUM') return 'threat-medium';
            return 'threat-high';
        }

        function updateUI(d) {
            const statusPanel = document.getElementById('status-panel');
            statusPanel.innerHTML = `
                <div class="main-card">
                    <div class="cable-info">
                        <h2>System ID: ${d.cable_id}</h2>
                        <span class="status-badge ${getStatusClass(d.overall_status)}">${d.overall_status}</span>
                    </div>
                    <div class="cable-info" style="text-align: right;">
                        <p style="font-size: 12px; color: #64748b;">LAST UPDATE</p>
                        <p style="font-weight: 600; color: #f1f5f9;">${d.timestamp}</p>
                    </div>
                </div>
            `;

            const metricsGrid = document.getElementById('metrics-grid');
            metricsGrid.innerHTML = `
                <div class="card">
                    <div class="card-title">Physical Environment</div>
                    <div class="metric-row">
                        <span class="metric-label">Cable Temp</span>
                        <span class="metric-value">${d.cable_temperature_c} °C</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Water Temp</span>
                        <span class="metric-value">${d.water_temperature_c} °C</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Pressure</span>
                        <span class="metric-value">${d.pressure_bars} bars</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Depth</span>
                        <span class="metric-value">${d.depth_meters} m</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Current Speed</span>
                        <span class="metric-value">${d.ocean_current_speed_knots} knots (${d.ocean_current_direction})</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Signal & Transmission</div>
                    <div class="metric-row">
                        <span class="metric-label">Signal Power</span>
                        <span class="metric-value">${d.optical_signal_power_dbm} dBm</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Attenuation</span>
                        <span class="metric-value">${d.attenuation_db_per_km} dB/km</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Bit Error Rate</span>
                        <span class="metric-value">${d.bit_error_rate}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Latency</span>
                        <span class="metric-value highlight">${d.latency_ms} ms</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Packet Loss</span>
                        <span class="metric-value">${d.packet_loss} %</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Network Capacity</div>
                    <div class="metric-row">
                        <span class="metric-label">Bandwidth Usage</span>
                        <span class="metric-value">${d.bandwidth_utilization} %</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Throughput</span>
                        <span class="metric-value highlight">${d.data_throughput_tbps} Tbps</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Daily Events</span>
                        <span class="metric-value">${d.daily_events.toLocaleString()}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Active Sensors</span>
                        <span class="metric-value">${d.active_sensors}</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Risks & Resilience</div>
                    <div class="metric-row">
                        <span class="metric-label">Damage Level</span>
                        <span class="metric-value">${d.damage_percentage} %</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Recovery Level</span>
                        <span class="metric-value">${d.recovery_percentage} %</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Seismic Activity</span>
                        <span class="metric-value">${d.seismic_activity}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Cyber Threat</span>
                        <span class="metric-value ${getThreatClass(d.cyber_threat_level)}">${d.cyber_threat_level}</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">Resilience Score</span>
                        <span class="metric-value highlight">${d.resilience_score} %</span>
                    </div>
                    <div class="metric-row">
                        <span class="metric-label">System Availability</span>
                        <span class="metric-value highlight">99.98 %</span>
                    </div>

                </div>
            `;
        }

        setInterval(fetchStatus, 2000);
        fetchStatus();
    </script>
</body>
</html>
